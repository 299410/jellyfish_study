version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nihongo-reflex-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: local_secure_password_123 # Khuyến cáo: Nên thay đổi mật khẩu mạnh hơn bằng biến môi trường trên VPS
      POSTGRES_DB: nihongo_reflex
    # Bảo mật: Không public cổng 5432 ra ngoài Internet. 
    # Database chỉ mở kết nối nội bộ cho container Next.js truy cập.
    expose:
      - '5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nihongo-reflex-web
    restart: always
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:local_secure_password_123@postgres:5432/nihongo_reflex?schema=public
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - postgres

volumes:
  pgdata:
